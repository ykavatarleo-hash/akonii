name: Update Akonii Member Counter

on:
  schedule:
    # GitHub Actions does not reliably support 1-minute schedules — frequent
    # cron schedules get queued/delayed, especially under load. 5 minutes is
    # the fastest interval GitHub generally honors close to on-time.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you manually trigger a run from the Actions tab

permissions:
  contents: write # needed so the workflow can commit state.json back to the repo

jobs:
  update-counter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run member counter script
        env:
          ROBLOX_GROUP_ID: ${{ secrets.ROBLOX_GROUP_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EMBED_COLOR_HEX: ${{ secrets.EMBED_COLOR_HEX }}
          MILESTONE_STEP: ${{ secrets.MILESTONE_STEP }}
          GROUP_DISPLAY_NAME: ${{ secrets.GROUP_DISPLAY_NAME }}
        run: node update-counter.js

      - name: Commit updated state.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update member count state"
          git push
